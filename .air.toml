# Air live-reload config for development
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -mod=mod -o ./tmp/main ./cmd/server"
  bin = "./tmp/main"
  full_bin = "./tmp/main"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["vendor", "tmp", "migrations"]
  delay = 1000
  kill_delay = "0s"
  rerun = false

[log]
  time = false

[color]
  main     = "magenta"
  watcher  = "cyan"
  build    = "yellow"
  runner   = "green"

[misc]
  clean_on_exit = true
