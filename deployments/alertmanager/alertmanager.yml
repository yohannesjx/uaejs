global:
  resolve_timeout: 5m

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'team', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default-slack'

  routes:
    - match:
        severity: critical
      receiver: 'critical-slack'
      group_wait: 10s
      repeat_interval: 1h

    - match:
        team: compliance
      receiver: 'compliance-slack'

    - match:
        team: engineering
      receiver: 'engineering-slack'

receivers:
  - name: 'default-slack'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/PLACEHOLDER/OPERATIONS'
        channel: '#dubai-ops-alerts'
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: '{{ if eq .Status "firing" }}{{ if eq (index .Alerts 0).Labels.severity "critical" }}danger{{ else }}warning{{ end }}{{ else }}good{{ end }}'

  - name: 'critical-slack'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/PLACEHOLDER/CRITICAL'
        channel: '#dubai-critical'
        send_resolved: true
        title: ':rotating_light: CRITICAL: {{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: 'danger'

  - name: 'compliance-slack'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/PLACEHOLDER/COMPLIANCE'
        channel: '#dubai-compliance'
        send_resolved: true
        title: ':memo: Compliance Alert: {{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'

  - name: 'engineering-slack'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/PLACEHOLDER/ENGINEERING'
        channel: '#dubai-engineering'
        send_resolved: true
        title: ':wrench: Engineering Alert: {{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'

inhibit_rules:
  # Suppress LowStock if Stockout is already firing for the same variant
  - source_match:
      alertname: StockoutVariant
    target_match:
      alertname: LowStockVariant
    equal: ['variant_id']
